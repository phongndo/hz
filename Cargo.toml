[workspace]
members = [
    "hz-cli",
    "hz-command",
    "hz-core",
    "hz-diff",
    "hz-git",
    "hz-tui",
    "hz-worktree",
]
resolver = "3"

[workspace.package]
version = "0.1.2"
edition = "2024"
license = "MIT"

[workspace.dependencies]
clap = { version = "4.5", features = ["derive"] }
crossterm = "0.29"
ratatui = "0.29"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
unicode-width = "0.2"

hz-core = { path = "hz-core" }
hz-command = { path = "hz-command" }
hz-diff = { path = "hz-diff" }
hz-git = { path = "hz-git" }
hz-tui = { path = "hz-tui" }
hz-worktree = { path = "hz-worktree" }
