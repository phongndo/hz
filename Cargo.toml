[workspace]
members = [
    "crates/hz-cli",
    "crates/hz-command",
    "crates/hz-core",
    "crates/hz-diff",
    "crates/hz-git",
    "crates/hz-tui",
    "crates/hz-worktree",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
clap = { version = "4.5", features = ["derive"] }
crossterm = "0.29"
ratatui = "0.29"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

hz-core = { path = "crates/hz-core" }
hz-command = { path = "crates/hz-command" }
hz-diff = { path = "crates/hz-diff" }
hz-git = { path = "crates/hz-git" }
hz-tui = { path = "crates/hz-tui" }
hz-worktree = { path = "crates/hz-worktree" }
