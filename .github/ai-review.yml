# Repo-local AI PR review settings.
# Disable by removing .github/workflows/ai-review.yml or clearing enabled_users.
enabled_users:
  - phongndo

provider:
  runtime: pi
  model_source: opencode-go

models:
  fast: opencode-go/mimo-v2.5
  serious: opencode-go/deepseek-v4-pro
  judge: opencode-go/mimo-v2.5-pro

mode: balanced

agents:
  correctness: true
  security: true
  tests: true
  maintainability: true
  performance: false
  dependency: false
  verification: true

thresholds:
  min_confidence: 0.65
  max_findings: 12
  post_low_severity: false

github:
  sticky_comment: true
  # When enabled, accepted findings are also posted as real GitHub PR review
  # comments anchored to lines in the diff. Existing AI inline comments are
  # deleted before new ones are posted to avoid duplicates.
  inline_comments: true
