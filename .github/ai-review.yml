# Repo-local AI PR review settings.
# Disable by removing .github/workflows/ai-review.yml or clearing enabled_users.
enabled_users:
  - phongndo

provider:
  runtime: pi
  model_source: opencode-go

models:
  fast: opencode-go/deepseek-v4-flash
  serious: opencode-go/deepseek-v4-pro
  dedupe: opencode-go/deepseek-v4-pro
  judge: opencode-go/deepseek-v4-pro

mode: balanced

agents:
  correctness: true
  security: auto
  # Keep noisy review lenses off by default. They can be re-enabled here
  # after their prompts prove they follow hz's simple-not-clever philosophy.
  tests: false
  maintainability: false
  performance: false
  dependency: auto
  verification: true

thresholds:
  min_confidence: 0.80
  max_findings: 3
  post_low_severity: false

github:
  # Post the model-generated PR summary once, then keep later review runs
  # findings-only so every pushed commit gets fresh issue comments without
  # noisy no-finding/status updates.
  summary_comment: true
  sticky_comment: false
  # When enabled, accepted findings are also posted as real GitHub PR review
  # comments anchored to lines in the diff. Existing AI inline comments are
  # deleted before new ones are posted to avoid duplicates.
  inline_comments: true
