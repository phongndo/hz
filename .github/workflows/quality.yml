name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACTIONLINT_VERSION: 1.7.12
  CARGO_TERM_COLOR: always

jobs:
  actionlint:
    name: GitHub Actions workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/actionlint"
          cd "$RUNNER_TEMP/actionlint"

          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          checksums="actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          base_url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"

          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSLO "$base_url/$archive"
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSLO "$base_url/$checksums"
          grep "  $archive$" "$checksums" | sha256sum -c -
          tar -xzf "$archive" actionlint
          chmod 0755 actionlint
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: actionlint -color

  rust-analyzer:
    name: Rust analyzer diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Run rust-analyzer diagnostics
        run: rust-analyzer diagnostics .

  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Check MSRV
        run: cargo check --workspace --all-targets --all-features --locked

  quality:
    name: Formatter, linter, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets --all-features --locked

      - name: Build
        run: cargo build --workspace --all-targets --all-features --locked

      - name: Smoke installer and update
        run: scripts/smoke-installer-update
