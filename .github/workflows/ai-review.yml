name: AI PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number
      mode:
        description: Review mode override
        required: false
        type: choice
        default: config
        options:
          - config
          - fast
          - balanced
          - deep
      override_allowlist:
        description: Maintainer override for the enabled_users allowlist
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

env:
  PI_VERSION: 0.79.1

jobs:
  review:
    name: AI PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout trusted reviewer configuration
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Preserve trusted reviewer files
        id: trusted
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f scripts/ci/ai_pr_review.py ] || [ ! -f .github/ai-review.yml ]; then
            echo "Trusted reviewer files are not present on the base ref; skipping."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/ai-review"
          cp scripts/ci/ai_pr_review.py "$RUNNER_TEMP/ai-review/ai_pr_review.py"
          cp .github/ai-review.yml "$RUNNER_TEMP/ai-review/ai-review.yml"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Check PR author allowlist
        id: gate
        if: steps.trusted.outputs.available == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_REVIEW_CONFIG: ${{ runner.temp }}/ai-review/ai-review.yml
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'config' }}
          INPUT_OVERRIDE_ALLOWLIST: ${{ github.event.inputs.override_allowlist || 'false' }}
        shell: bash
        run: python3 "$RUNNER_TEMP/ai-review/ai_pr_review.py" gate

      - name: Skip AI review
        if: steps.trusted.outputs.available != 'true' || steps.gate.outputs.should_review != 'true'
        run: echo "AI review skipped."

      - name: Check out PR head with full history
        if: steps.gate.outputs.should_review == 'true'
        env:
          PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
          BASE_REF: ${{ steps.gate.outputs.base_ref }}
          HEAD_SHA: ${{ steps.gate.outputs.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin \
            "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/ai-review-pr-${PR_NUMBER}"
          git checkout --detach "$HEAD_SHA"
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base "origin/${BASE_REF}" HEAD >/dev/null

      - name: Prepare trusted AI review driver
        if: steps.gate.outputs.should_review == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import py_compile
          import re
          import textwrap
          from pathlib import Path

          review_dir = Path(os.environ["RUNNER_TEMP"]) / "ai-review"
          script_path = review_dir / "ai_pr_review.py"
          config_path = review_dir / "ai-review.yml"

          script = script_path.read_text(encoding="utf-8")
          if 'f"@{prompt_file.name}"' not in script:
              if "import tempfile\n" not in script:
                  script = script.replace("import sys\n", "import sys\nimport tempfile\n", 1)
              start = script.index("def run_pi(")
              end = script.index("\n\ndef reviewer_prompt", start)
              replacement = textwrap.dedent('''
                  def run_pi(prompt: str, model: str, label: str, *, thinking: str = "low") -> str:
                      log(f"Running {label} with {model}")
                      with tempfile.NamedTemporaryFile(
                          "w", encoding="utf-8", prefix="ai-pr-review-prompt-", suffix=".md"
                      ) as prompt_file:
                          prompt_file.write(prompt)
                          prompt_file.flush()
                          command = [
                              "pi",
                              "--no-session",
                              "--no-extensions",
                              "--no-skills",
                              "--no-prompt-templates",
                              "--no-context-files",
                              "--no-tools",
                              "--no-approve",
                              "--system-prompt",
                              READ_ONLY_SYSTEM_PROMPT,
                              "--model",
                              model,
                              "--thinking",
                              thinking,
                              "-p",
                              f"@{prompt_file.name}",
                          ]
                          result = subprocess.run(
                              command,
                              stdout=subprocess.PIPE,
                              stderr=subprocess.PIPE,
                              text=True,
                              errors="replace",
                              env=pi_env(),
                              timeout=900,
                          )
                      if result.stderr.strip():
                          sys.stderr.write(result.stderr)
                      if result.returncode != 0:
                          raise RuntimeError(f"Pi {label} failed with exit code {result.returncode}")
                      return result.stdout.strip()
              ''').strip("\n")
              script = script[:start] + replacement + script[end:]
              script_path.write_text(script, encoding="utf-8")
          py_compile.compile(str(script_path), doraise=True)

          config = config_path.read_text(encoding="utf-8")
          config = re.sub(r"(?m)^  fast: .*$", "  fast: opencode-go/deepseek-v4-flash", config)
          config = re.sub(r"(?m)^  serious: .*$", "  serious: opencode-go/deepseek-v4-pro", config)
          if re.search(r"(?m)^  dedupe:", config):
              config = re.sub(r"(?m)^  dedupe: .*$", "  dedupe: opencode-go/deepseek-v4-pro", config)
          else:
              config = re.sub(
                  r"(?m)^(  serious: opencode-go/deepseek-v4-pro)$",
                  "\\1\n  dedupe: opencode-go/deepseek-v4-pro",
                  config,
                  count=1,
              )
          config = re.sub(r"(?m)^  judge: .*$", "  judge: opencode-go/deepseek-v4-pro", config)
          if re.search(r"(?m)^  sticky_comment:", config):
              config = re.sub(r"(?m)^  sticky_comment: .*$", "  sticky_comment: false", config)
          else:
              config = config.rstrip() + "\n  sticky_comment: false\n"
          config_path.write_text(config, encoding="utf-8")
          PY

      - name: Setup Node.js
        if: steps.gate.outputs.should_review == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Pi
        if: steps.gate.outputs.should_review == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm install --prefix "$RUNNER_TEMP/pi-install" --ignore-scripts "@earendil-works/pi-coding-agent@${PI_VERSION}"
          echo "$RUNNER_TEMP/pi-install/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Post one-time PR summary
        if: steps.gate.outputs.should_review == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          AI_REVIEW_CONFIG: ${{ runner.temp }}/ai-review/ai-review.yml
          AI_REVIEW_PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
          AI_REVIEW_AUTHOR: ${{ steps.gate.outputs.author }}
          AI_REVIEW_BASE_REF: ${{ steps.gate.outputs.base_ref }}
          AI_REVIEW_BASE_SHA: ${{ steps.gate.outputs.base_sha }}
          AI_REVIEW_HEAD_SHA: ${{ steps.gate.outputs.head_sha }}
          AI_REVIEW_HEAD_REF: ${{ steps.gate.outputs.head_ref }}
          AI_REVIEW_MODE: ${{ steps.gate.outputs.mode }}
          PI_CODING_AGENT_DIR: ${{ runner.temp }}/pi-agent
          PI_CODING_AGENT_SESSION_DIR: ${{ runner.temp }}/pi-sessions
          PI_SKIP_VERSION_CHECK: "1"
          PI_TELEMETRY: "0"
        shell: bash
        run: |
          set -euo pipefail
          if python3 "$RUNNER_TEMP/ai-review/ai_pr_review.py" --help 2>&1 | grep -q 'summary'; then
            python3 "$RUNNER_TEMP/ai-review/ai_pr_review.py" summary
          else
            echo "Trusted AI review driver does not support one-time summaries yet; skipping."
          fi

      - name: Run AI PR review
        if: steps.gate.outputs.should_review == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          AI_REVIEW_CONFIG: ${{ runner.temp }}/ai-review/ai-review.yml
          AI_REVIEW_PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
          AI_REVIEW_AUTHOR: ${{ steps.gate.outputs.author }}
          AI_REVIEW_BASE_REF: ${{ steps.gate.outputs.base_ref }}
          AI_REVIEW_BASE_SHA: ${{ steps.gate.outputs.base_sha }}
          AI_REVIEW_HEAD_SHA: ${{ steps.gate.outputs.head_sha }}
          AI_REVIEW_HEAD_REF: ${{ steps.gate.outputs.head_ref }}
          AI_REVIEW_MODE: ${{ steps.gate.outputs.mode }}
          PI_CODING_AGENT_DIR: ${{ runner.temp }}/pi-agent
          PI_CODING_AGENT_SESSION_DIR: ${{ runner.temp }}/pi-sessions
          PI_SKIP_VERSION_CHECK: "1"
          PI_TELEMETRY: "0"
        shell: bash
        run: python3 "$RUNNER_TEMP/ai-review/ai_pr_review.py" review
